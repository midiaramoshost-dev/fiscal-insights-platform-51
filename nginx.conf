server {
    listen 80;
    server_name localhost;
    
    # Pasta onde estão os arquivos estáticos do React/Vite
    root /usr/share/nginx/html;
    index index.html;

    # Configuração essencial para Single Page Applications (SPA)
    # Redireciona qualquer rota que não seja um arquivo físico para o index.html
    # Isso permite que rotas como /login ou /dashboard funcionam ao recarregar a página
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Otimização de Cache para arquivos estáticos (imagens, fontes, CSS, JS)
    # Define cache de 1 ano para arquivos que mudam pouco (hash no nome)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Habilita compressão Gzip para reduzir tamanho dos dados transferidos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # Desabilita listagem de diretórios por segurança
    autoindex off;
}
